# todoui configuration
# Place at ~/.config/todoui/config.toml
# All values can be overridden with environment variables.

[sync]
# Enable background sync with ichrisbirch API
# Env: TODOUI_SYNC
enabled = false
# API URL for sync (required when enabled)
# Env: TODOUI_SYNC_URL
# api_url = "https://api.ichrisbirch.com"
# Personal API key (ichrisbirch: POST /api-keys/ to generate)
# Env: TODOUI_SYNC_KEY
# api_key = "icb_..."

[local]
# Path to SQLite database
# Env: TODOUI_DB
# Default: ~/.local/share/todoui/todoui.db
# db_path = "/custom/path/todoui.db"
